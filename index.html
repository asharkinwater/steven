<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>The Adventures of Steven: Road Warrior</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #111; overflow: hidden; font-family: 'Courier New', monospace; overscroll-behavior:none; }
body { touch-action:none; -webkit-user-select:none; user-select:none; }
#wrap { position: fixed; line-height: 0; transform-origin: 0 0; }
canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; touch-action: none; }
.scanline { position:absolute; top:0; left:0; width:100%; height:100%; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px); pointer-events:none; z-index:50; }
#ui { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; }
:root { --uis: 1; }
#hud { position:absolute; top:6px; left:6px; color:#0ff; font-family:'Courier New',monospace; font-size:calc(11px/var(--uis)); line-height:1.75; pointer-events:none; background:rgba(0,0,0,0.6); padding:calc(5px/var(--uis)) calc(9px/var(--uis)); border:1px solid rgba(0,255,255,0.25); }
#chapter-banner { position:absolute; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.92); z-index:40; pointer-events:none; }
/* ---- Dialog layer — lives OUTSIDE #wrap so it is never rotated ---- */
#dialog-layer { position:fixed; z-index:200; left:0; right:0; bottom:0; display:flex; flex-direction:column; justify-content:flex-end; pointer-events:none; }
#msg-box { background:#040414; border:3px solid #ffd700; padding:12px 14px; color:#fff; font-family:'Courier New',monospace; font-size:13px; line-height:1.6; display:none; pointer-events:all; overflow-y:auto; overflow-wrap:break-word; -webkit-overflow-scrolling:touch; max-height:38vh; }
#choices { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; padding:6px; pointer-events:all; }
#choices:empty { display:none; }
.pixel-btn { background:#0a0a1a; border:2px solid #e94560; color:#e94560; font-family:'Courier New',monospace; font-size:12px; padding:9px 14px; cursor:pointer; text-transform:uppercase; letter-spacing:1px; transition:all 0.1s; }
.pixel-btn:hover, .pixel-btn:active { background:#e94560; color:#000; }
/* ---- Mobile overrides ---- */
@media (pointer: coarse), (max-width: 820px) {
  #hud { font-size:calc(9px/var(--uis)); line-height:1.45; max-width:96%; }
  #msg-box { font-size:14px; padding:12px 14px; max-height:42vh; }
  #choices { display:grid; grid-template-columns:1fr; gap:7px; padding:0; }
  .pixel-btn { width:100%; min-height:50px; font-size:14px; line-height:1.2; letter-spacing:0; white-space:normal; overflow-wrap:anywhere; }
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div class="scanline"></div>
  <div id="ui">
    <div id="hud"></div>
    <div id="chapter-banner"></div>
  </div>
</div>
<div id="dialog-layer">
  <div id="msg-box"></div>
  <div id="choices"></div>
</div>
<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
const W = 800, H = 520;
C.width = W; C.height = H;
const wrap = document.getElementById('wrap');
wrap.style.width = W + 'px'; wrap.style.height = H + 'px';
const isCoarse = () => matchMedia('(pointer: coarse)').matches || innerWidth <= 820;
const isPortrait = () => isCoarse() && window.innerWidth < window.innerHeight;

const dialogLayer = document.getElementById('dialog-layer');
function layoutGame(){
  const vw = window.innerWidth, vh = window.innerHeight;
  const safeTop = Math.max(0, Number.parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--sat')) || 0);
  let scale, tx, ty;
  if(isPortrait()){
    // Rotate game -90° so landscape canvas fills a portrait screen
    scale = Math.min(vw / H, (vh - safeTop) / W);
    tx = Math.floor((vw - H * scale) / 2);
    ty = Math.floor(safeTop + (vh - safeTop + W * scale) / 2);
    wrap.style.transform = `translate(${tx}px,${ty}px) rotate(-90deg) scale(${scale})`;
    // Dialog stays in normal portrait orientation — no rotation, full width at bottom
    dialogLayer.style.left   = '0';
    dialogLayer.style.right  = '0';
    dialogLayer.style.bottom = '0';
    dialogLayer.style.top    = 'auto';
    dialogLayer.style.width  = 'auto';
    dialogLayer.style.height = 'auto';
    dialogLayer.style.transform = 'none';
    dialogLayer.style.transformOrigin = '0 0';
  } else {
    scale = Math.min(vw / W, (vh - safeTop) / H);
    tx = Math.floor((vw - W * scale) / 2);
    ty = Math.floor(safeTop + Math.max(0, (vh - safeTop - H * scale) / 2));
    wrap.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
    // Dialog at the bottom of the canvas footprint, no rotation
    dialogLayer.style.left   = `${tx}px`;
    dialogLayer.style.right  = `${Math.max(0, vw - tx - Math.round(W * scale))}px`;
    dialogLayer.style.bottom = `${Math.max(0, vh - ty - Math.round(H * scale))}px`;
    dialogLayer.style.top    = 'auto';
    dialogLayer.style.width  = 'auto';
    dialogLayer.style.height = 'auto';
    dialogLayer.style.transform = 'none';
    dialogLayer.style.transformOrigin = '0 0';
  }
  const uiScale = isCoarse() ? Math.min(0.92, Math.max(0.62, scale * 1.25)) : Math.max(scale, 0.42);
  document.documentElement.style.setProperty('--uis', uiScale.toFixed(3));
}
window.addEventListener('resize', layoutGame);
window.addEventListener('orientationchange', () => setTimeout(layoutGame, 150));
if (window.visualViewport) window.visualViewport.addEventListener('resize', layoutGame);
window.addEventListener('touchmove', e => { if(!(e.target.closest && (e.target.closest('#dialog-layer')))) e.preventDefault(); }, {passive:false});
layoutGame();

// ---- GAME STATE ----
const GS = {
  screen: 'title',
  minigame: null,
  chapter: 1,
  health: 100, fuel: 100, chips: 500, money: 250, reputation: 50, miles: 0, day: 1,
  flags: { gainedPowers:false, lostClothes:false, ninjasDefeated:false, huntingDone:false, llnlVisited:false, becameGarbageMan:false },
  // Route: Bothell=0, Portland=1, Sacramento=2, Livermore=3(LLNL auto), LA=4, LV=5, SLC=6, Denver=7, ABQ=8
  destinations: [
    { name:'Bothell, WA',       x:138, y:72  },
    { name:'Portland, OR',      x:120, y:152 },
    { name:'Sacramento, CA',    x:88,  y:258 },
    { name:'Livermore, CA',     x:78,  y:295, special:'llnl' },
    { name:'Los Angeles, CA',   x:68,  y:375 },
    { name:'Las Vegas, NV',     x:188, y:358 },
    { name:'Salt Lake City, UT',x:255, y:272 },
    { name:'Denver, CO',        x:330, y:262 },
    { name:'Albuquerque, NM',   x:300, y:378 },
    { name:'Bothell, WA',       x:138, y:72, return:true },
  ],
  currentDest: 0,
  driveProgress: 0, driveTarget: 0, driveSpeed: 1,
  mg: {}, mgScore: 0,
  awaitingChoice: false,
  eventsFired: new Set(),
  t: 0, frameCount: 0,
};

// region helper (for road backgrounds)
function region() {
  const d = GS.currentDest;
  if (d <= 1) return 'nw';
  if (d <= 4) return 'ca';
  if (d <= 6) return 'desert';
  return 'mountain';
}

// ---- INPUT ----
const keys = {}, kd = {};
const mouse = {x: W/2, y: H/2};
function press(code){ if(!keys[code]) kd[code]=true; keys[code]=true; }
function release(code){ keys[code]=false; }
function setPointerFromClient(x,y){
  const r=C.getBoundingClientRect();
  if(isPortrait()){
    // Canvas is rotated -90°: physical X → game Y, physical Y → game X (inverted)
    mouse.x=Math.max(0,Math.min(W, W*(1-(y-r.top)/r.height)));
    mouse.y=Math.max(0,Math.min(H, H*(x-r.left)/r.width));
  } else {
    mouse.x=Math.max(0,Math.min(W,(x-r.left)*(W/r.width)));
    mouse.y=Math.max(0,Math.min(H,(y-r.top)*(H/r.height)));
  }
}

// Virtual joystick — replaces D-pad on touch screens
const vj={active:false,pointerId:-1,startX:0,startY:0,dx:0,dy:0,canvasX:0,canvasY:0};
const VJ_DEAD=16, VJ_FULL=58;
function vjUpdate(){
  // In portrait mode the canvas is rotated -90°, so physical X→gameY, physical Y→game-X
  const edx = isPortrait() ? -vj.dy : vj.dx;
  const edy = isPortrait() ?  vj.dx : vj.dy;
  const ax=Math.abs(edx), ay=Math.abs(edy);
  if(ax>VJ_DEAD||ay>VJ_DEAD){
    if(ax>ay){
      release('ArrowUp'); release('ArrowDown');
      if(edx< -VJ_DEAD) press('ArrowLeft'); else release('ArrowLeft');
      if(edx>  VJ_DEAD) press('ArrowRight'); else release('ArrowRight');
    } else {
      release('ArrowLeft'); release('ArrowRight');
      if(edy< -VJ_DEAD) press('ArrowUp'); else release('ArrowUp');
      if(edy>  VJ_DEAD) press('ArrowDown'); else release('ArrowDown');
    }
  } else {
    ['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].forEach(release);
  }
}
function vjEnd(wasTap){
  vj.active=false; vj.pointerId=-1;
  ['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].forEach(release);
  if(wasTap){ kd['Space']=true; kd['MouseLeft']=true; }
}
function drawVJ(){
  if(!vj.active||!isCoarse()) return;
  const bx=vj.canvasX, by=vj.canvasY;
  const dx=mouse.x-bx, dy=mouse.y-by, dist=Math.sqrt(dx*dx+dy*dy);
  const cx=dist>VJ_FULL?bx+dx/dist*VJ_FULL:mouse.x;
  const cy=dist>VJ_FULL?by+dy/dist*VJ_FULL:mouse.y;
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,0.28)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(bx,by,VJ_FULL,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.38)';
  ctx.beginPath(); ctx.arc(cx,cy,22,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

window.addEventListener('keydown', e => { e.preventDefault(); press(e.code); });
window.addEventListener('keyup',   e => { release(e.code); });
C.addEventListener('mousemove', e => setPointerFromClient(e.clientX,e.clientY));
C.addEventListener('mousedown', e => { setPointerFromClient(e.clientX,e.clientY); kd['MouseLeft']=true; });
C.addEventListener('pointerdown', e => {
  setPointerFromClient(e.clientX,e.clientY);
  kd['MouseLeft']=true;
  if(AC.state==='suspended') AC.resume();
  if(isCoarse()&&!vj.active){
    vj.active=true; vj.pointerId=e.pointerId;
    vj.startX=e.clientX; vj.startY=e.clientY; vj.dx=0; vj.dy=0;
    vj.canvasX=mouse.x; vj.canvasY=mouse.y;
  }
});
C.addEventListener('pointermove', e => {
  setPointerFromClient(e.clientX,e.clientY);
  if(vj.active&&e.pointerId===vj.pointerId){
    vj.dx=e.clientX-vj.startX; vj.dy=e.clientY-vj.startY;
    vjUpdate();
  }
});
C.addEventListener('pointerup', e => {
  if(vj.active&&e.pointerId===vj.pointerId){
    vjEnd(Math.abs(vj.dx)<14&&Math.abs(vj.dy)<14);
  }
});
C.addEventListener('pointercancel', e => {
  if(vj.active&&e.pointerId===vj.pointerId) vjEnd(false);
});


// ---- SOUND ----
const AC = new (window.AudioContext||window.webkitAudioContext)();
function beep(freq,dur=0.1,type='square',vol=0.14) {
  try {
    const o=AC.createOscillator(), g=AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(vol,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
    o.start(); o.stop(AC.currentTime+dur);
  } catch(e){}
}
function playJingle(notes){notes.forEach(([f,d,t])=>setTimeout(()=>beep(f,d,'square',0.12),t));}
function titleJingle(){playJingle([[330,.15,0],[392,.15,150],[440,.15,300],[523,.3,450],[440,.15,800],[392,.15,950],[330,.4,1100]]);}
function successJingle(){playJingle([[523,.1,0],[659,.1,120],[784,.2,240]]);}
function failJingle(){playJingle([[300,.15,0],[250,.15,150],[200,.3,300]]);}

// ---- DRAW HELPERS ----
function rect(x,y,w,h,col){ctx.fillStyle=col;ctx.fillRect(x,y,w,h);}
function rectOutline(x,y,w,h,col,t=2){ctx.strokeStyle=col;ctx.lineWidth=t;ctx.strokeRect(x+t/2,y+t/2,w-t,h-t);}
function txt(s,x,y,col='#fff',size=12,align='left'){ctx.font=`bold ${size}px 'Courier New'`;ctx.fillStyle=col;ctx.textAlign=align;ctx.fillText(s,x,y);}
function txtShadow(s,x,y,col,shadow,size,align='center'){
  ctx.font=`bold ${size}px 'Courier New'`; ctx.textAlign=align;
  ctx.fillStyle=shadow; ctx.fillText(s,x+2,y+2);
  ctx.fillStyle=col;    ctx.fillText(s,x,y);
}

// ---- SPRITES ----
function drawSteven(x,y,scale=1,anim=0) {
  const s=scale, la=Math.sin(anim*.3)*3;
  rect(x-6*s,y+20*s+la,8*s,12*s,'#3a5a8c');
  rect(x+2*s,y+20*s-la,8*s,12*s,'#3a5a8c');
  rect(x-8*s,y+30*s,10*s,4*s,'#222');
  rect(x+2*s,y+30*s,10*s,4*s,'#222');
  rect(x-10*s,y+8*s,24*s,14*s,'#e8e8e8');
  rect(x-16*s,y+10*s,8*s,10*s,'#f0c8a0');
  rect(x+12*s,y+10*s,8*s,10*s,'#f0c8a0');
  rect(x-8*s,y-10*s,20*s,20*s,'#f0c8a0');
  rect(x-8*s,y-10*s,20*s,6*s,'#8B4513');
  rect(x-4*s,y+6*s,12*s,4*s,'#9B7355');
  ctx.strokeStyle='#555'; ctx.lineWidth=s;
  ctx.strokeRect(x-7*s,y-2*s,8*s,6*s);
  ctx.strokeRect(x+1*s,y-2*s,8*s,6*s);
  ctx.beginPath(); ctx.moveTo(x+1*s,y+s); ctx.lineTo(x+s,y+s); ctx.stroke();
  rect(x-5*s,y,3*s,3*s,'#333'); rect(x+3*s,y,3*s,3*s,'#333');
}

function drawAugust(x,y,scale=1) {
  const s=scale;
  rect(x-6*s,y+20*s,8*s,12*s,'#1a3a5c'); rect(x+2*s,y+20*s,8*s,12*s,'#1a3a5c');
  rect(x-10*s,y+8*s,24*s,14*s,'#1a5c8c');
  rect(x-16*s,y+10*s,8*s,10*s,'#1a5c8c'); rect(x+12*s,y+10*s,8*s,10*s,'#1a5c8c');
  rect(x-8*s,y-10*s,20*s,20*s,'#d4a882');
  rect(x-8*s,y+2*s,20*s,10*s,'#5a4030');
  rect(x-8*s,y-12*s,20*s,8*s,'#c8a878'); rect(x-4*s,y-18*s,14*s,8*s,'#6495ED');
  ctx.strokeStyle='#111'; ctx.lineWidth=2*s;
  ctx.strokeRect(x-7*s,y-4*s,8*s,6*s); ctx.strokeRect(x+1*s,y-4*s,8*s,6*s);
  rect(x-5*s,y-2*s,3*s,3*s,'#333'); rect(x+3*s,y-2*s,3*s,3*s,'#333');
}

// Truck facing RIGHT: trailer on left, cab (front) on right
function drawTruck(x,y,scale=1,col='#e63946') {
  const s=scale;
  // trailer
  rect(x,y-18*s,108*s,36*s,'#b8b8b8');
  rect(x,y-22*s,108*s,5*s,'#999');
  ctx.font=`bold ${Math.max(6,Math.round(8*s))}px 'Courier New'`;
  ctx.fillStyle='#555'; ctx.textAlign='center';
  ctx.fillText('POTATO CHIPS',x+54*s,y+3*s);
  // cab (front/right)
  rect(x+100*s,y-24*s,52*s,44*s,col);
  rect(x+100*s,y+14*s,52*s,5*s,'#b02020');
  // windshield on right side of cab = front
  rect(x+124*s,y-20*s,24*s,17*s,'#88ccff');
  // headlights at nose
  rect(x+148*s,y-9*s,5*s,5*s,'#ffff99');
  rect(x+148*s,y+1*s,5*s,4*s,'#ff4400');
  // wheels
  [[x+10*s],[x+70*s],[x+108*s],[x+128*s]].forEach(([wx])=>{
    rect(wx,y+14*s,18*s,18*s,'#1a1a1a');
    rect(wx+3*s,y+17*s,12*s,12*s,'#444');
    rect(wx+6*s,y+20*s,6*s,6*s,'#777');
  });
  // exhaust stacks on rear-left of cab
  rect(x+102*s,y-40*s,5*s,18*s,'#666');
  rect(x+109*s,y-42*s,5*s,18*s,'#888');
  // smoke
  if(Math.floor(GS.t*.1)%3===0){
    ctx.fillStyle='rgba(160,160,160,0.35)';
    ctx.beginPath(); ctx.arc(x+105*s,y-43*s,7*s,0,Math.PI*2); ctx.fill();
  }
}

function drawTree(x,y,s=1){rect(x-4,y,8,20*s,'#5a3010');rect(x-16,y-30*s,32,30*s,'#2d6a10');rect(x-10,y-50*s,20,24*s,'#1d5a00');}
function drawCloud(x,y,w){
  ctx.fillStyle='rgba(220,228,242,0.52)';
  ctx.beginPath();ctx.arc(x,y,w*.38,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+w*.28,y-w*.12,w*.28,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+w*.56,y+w*.04,w*.22,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x-w*.26,y+w*.06,w*.20,0,Math.PI*2);ctx.fill();
}
function drawPalm(x,y){
  rect(x-3,y,6,55,'#8B6914');
  for(let i=0;i<7;i++){const a=i*Math.PI/3.5-Math.PI/6; ctx.strokeStyle='#2d6a10'; ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+Math.cos(a)*35,y-20+Math.sin(a)*18); ctx.stroke();}
}
function drawCactus(x,y){
  rect(x-5,y-40,10,50,'#2d6a10');
  rect(x-18,y-25,13,8,'#2d6a10'); rect(x-18,y-35,8,18,'#2d6a10');
  rect(x+5,y-20,13,8,'#2d6a10');  rect(x+5,y-30,8,14,'#2d6a10');
}
function drawMountains(yBase,col='#1a3a5c'){
  ctx.fillStyle=col; ctx.beginPath(); ctx.moveTo(0,yBase);
  [0,80,160,240,320,400,480,560,640,720,800].forEach((x,i)=>{
    const h=i%2===0?55+Math.sin(i*1.3)*40:15+Math.sin(i*.7)*20;
    ctx.lineTo(x,yBase-h);
  });
  ctx.lineTo(800,yBase); ctx.closePath(); ctx.fill();
}
function drawStars(n=50){
  for(let i=0;i<n;i++){
    const sx=(i*137)%800,sy=(i*97)%150;
    rect(sx,sy,2,2,Math.sin(GS.t*.05+i)>.5?'#fff':'#aaa');
  }
}

// Region-specific road scene
function drawRoad(offset=0) {
  const reg=region();

  // Sky
  let sky=ctx.createLinearGradient(0,0,0,H);
  if(reg==='nw'){
    sky.addColorStop(0,'#0a1a2e'); sky.addColorStop(.45,'#1a3a5c'); sky.addColorStop(.6,'#4a6a8a'); sky.addColorStop(1,'#222');
  } else if(reg==='ca'){
    sky.addColorStop(0,'#0a0a2e'); sky.addColorStop(.35,'#1a3a6e'); sky.addColorStop(.5,'#e87c3e'); sky.addColorStop(.65,'#c8501a'); sky.addColorStop(1,'#222');
  } else if(reg==='desert'){
    sky.addColorStop(0,'#000818'); sky.addColorStop(.4,'#102040'); sky.addColorStop(.55,'#c84010'); sky.addColorStop(.7,'#8B3010'); sky.addColorStop(1,'#1a1a0a');
  } else {
    sky.addColorStop(0,'#050520'); sky.addColorStop(.4,'#0a1a40'); sky.addColorStop(.55,'#2a4a6a'); sky.addColorStop(.7,'#3a3a2a'); sky.addColorStop(1,'#111');
  }
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  if(reg==='nw'||reg==='mountain') drawStars(30);
  else drawStars(50);

  // Animated clouds
  if(reg==='nw'||reg==='ca'){
    [[90,68,68],[230,52,54],[400,74,72],[560,58,60],[720,66,58]].forEach(([cx,cy,cw],i)=>{
      drawCloud(((cx-offset*.06*(1+i*.15))%920+920)%920, cy, cw);
    });
  } else if(reg==='mountain'){
    [[80,60,45],[310,50,38],[590,64,50]].forEach(([cx,cy,cw])=>{
      drawCloud(((cx-offset*.05)%920+920)%920, cy, cw);
    });
  }

  // Background scenery
  if(reg==='nw'){
    drawMountains(210,'#1a3a5c');
    // Far treeline silhouette
    ctx.fillStyle='#163516';
    for(let i=0;i<14;i++){const tx=((i*68-offset*.12)%960+960)%960;ctx.fillRect(tx,200,10,22);}
    for(let i=0;i<6;i++) drawTree(((i*145-offset*.3)%960+960)%960,272,.9+i%3*.25);
  } else if(reg==='ca'){
    ctx.fillStyle='#c8a820';
    for(let i=0;i<5;i++){ctx.beginPath();ctx.arc(i*200+80,195,130,0,Math.PI);ctx.fill();}
    ctx.fillStyle='#a88010';
    for(let i=0;i<4;i++){ctx.beginPath();ctx.arc(i*210+40,210,90,0,Math.PI);ctx.fill();}

function hideHUD(){hud.style.display='none'; msgBox.style.display='none'; choicesDiv.innerHTML='';}
function showHUD(){hud.style.display='block';}

function showMsg(text,good=false,continueFn=null){
  msgBox.style.display='block';
  msgBox.style.borderColor=good?'#00ff88':'#e94560';
  msgBox.innerHTML=`<span style="color:${good?'#00ff88':'#e94560'}">${text}</span>`;
  choicesDiv.innerHTML='';
  const btn=document.createElement('button');
  btn.className='pixel-btn'; btn.textContent='[ CONTINUE ]';
  btn.onclick=()=>{msgBox.style.display='none'; choicesDiv.innerHTML=''; GS.awaitingChoice=false; beep(440,.05); if(continueFn) continueFn();};
  choicesDiv.appendChild(btn);
  GS.awaitingChoice=true;
}

function triggerEvent(ev){
  if(!ev) return;
  // Always stamp oneTime events into eventsFired — double-guard against re-entry
  if(ev.oneTime&&ev.id) GS.eventsFired.add(ev.id);
  GS.awaitingChoice=true;
  msgBox.style.display='block';
  msgBox.style.borderColor='#ffd700';
  msgBox.innerHTML=`<span style="color:#ffd700;font-size:14px">★ ${ev.title} ★</span><br><br>${ev.text}`;
  choicesDiv.innerHTML='';
  ev.choices.forEach(c=>{
    const btn=document.createElement('button');
    btn.className='pixel-btn'; btn.textContent=`[ ${c.label} ]`;
    btn.onclick=()=>{msgBox.style.display='none'; choicesDiv.innerHTML=''; GS.awaitingChoice=false; beep(440,.05); c.fn(GS);};
    choicesDiv.appendChild(btn);
  });
  beep(880,.1); setTimeout(()=>beep(660,.1),120); setTimeout(()=>beep(440,.15),240);
}

function showChapterBanner(num,title,sub,cb){
  chapterBanner.style.display='flex';
  chapterBanner.innerHTML=`
    <div style="color:#555;font-family:'Courier New',monospace;font-size:14px;letter-spacing:4px;margin-bottom:8px">CHAPTER ${num}</div>
    <div style="color:#ffd700;font-family:'Courier New',monospace;font-size:32px;font-weight:bold;text-shadow:3px 3px #e94560;letter-spacing:3px">${title}</div>
    <div style="color:#00ff88;font-family:'Courier New',monospace;font-size:14px;margin-top:12px">${sub}</div>`;
  setTimeout(()=>{chapterBanner.style.display='none'; if(cb) cb();},3000);
}

// Random trivia questions for the radio event — new one each time
const TRIVIA=[
  {q:"What was the first US state to ratify the Constitution?", correct:"Delaware", wrong:["Pennsylvania","New Jersey"], prize:500},
  {q:"What year did the US Interstate Highway System begin?", correct:"1956", wrong:["1944","1968"], prize:400},
  {q:"Which US state has the most miles of interstate highway?", correct:"Texas", wrong:["California","Ohio"], prize:350},
  {q:"What is the longest US interstate highway?", correct:"I-90", wrong:["I-10","I-80"], prize:450},
  {q:"How many US states have never had a tornado?", correct:"None — all 50 have", wrong:["3","7"], prize:300},
  {q:"What city is nicknamed 'The City of Angles'?", correct:"Los Angeles", wrong:["Las Vegas","Phoenix"], prize:250},
  {q:"What mountain range runs through Colorado?", correct:"Rocky Mountains", wrong:["Appalachians","Sierra Nevada"], prize:300},
  {q:"What river forms the border between Texas and Mexico?", correct:"Rio Grande", wrong:["Colorado River","Pecos River"], prize:350},
];
let triviaPool=[];
let _triviaQ=null; // holds current question until answered — never consumed silently
function getRadioEvent(){
  // Peek at next question without consuming it; only advance after the player answers
  if(!_triviaQ){
    if(triviaPool.length===0) triviaPool=[...TRIVIA].sort(()=>Math.random()-.5);
    _triviaQ=triviaPool.pop();
  }
  const q=_triviaQ;
  const wrong=q.wrong[Math.floor(Math.random()*q.wrong.length)];
  const advance=()=>{_triviaQ=null;}; // call on any answer to unlock next question
  return {
    id:'radio_trivia',
    title:'RADIO TRIVIA CONTEST!',
    text:`Country 94.3 is live with a trivia contest! The question: "${q.q}" — answer correctly and win $${q.prize} cash! The DJ is standing by...`,
    choices:[
      {label:q.correct, fn:gs=>{advance();gs.money+=q.prize;gs.reputation+=8;successJingle();showMsg(`CORRECT! You win $${q.prize}! The DJ declares you the smartest trucker on the highway.`,true);}},
      {label:wrong, fn:gs=>{advance();showMsg('WRONG. The DJ lets out a long, disappointed sigh on air.',false);}},
      {label:'Focus on driving', fn:gs=>{advance();showMsg('You resist temptation. Someone else wins. Sensible, if sad.',false);}},
    ]
  };
}

function triggerRandomDriveEvent(isFirstSlot=false){
  if(isFirstSlot){
    const scripted=EVENTS.find(e=>e.leg===GS.currentDest&&!GS.eventsFired.has(e.id));
    if(scripted){GS.eventsFired.add(scripted.id);triggerEvent(scripted);return;}
  }
  const pool=EVENTS.filter(e=>{
    if(e.leg!==undefined) return false;
    if(e.oneTime&&GS.eventsFired.has(e.id)) return false;
    return true;
  });
  const candidates=[...pool, getRadioEvent()];
  const ev=candidates[Math.floor(Math.random()*candidates.length)];
  if(ev){if(ev.oneTime&&ev.id) GS.eventsFired.add(ev.id); triggerEvent(ev);}
}

function startDrive(){
  GS.screen='drive';
  GS.driveProgress=0;
  GS.driveTarget=1; // normalized 0→1
  GS.driveSpeed=0;
  GS.mg={
    roadOffset:0, dust:[],
    driveStartT:0,            // set on first draw frame
    driveDuration:8000+Math.random()*2000, // 8–10 real seconds
    drivePauseMs:0, drivePauseStart:0,
    eventPoints:[.3+Math.random()*.08, .63+Math.random()*.08],
    eventIdx:0,
  };
  showHUD();
}

function drawDrive(){
  const now=performance.now();
  if(!GS.mg.driveStartT) GS.mg.driveStartT=now;
  if(GS.awaitingChoice){
    if(!GS.mg.drivePauseStart) GS.mg.drivePauseStart=now;
  } else {
    if(GS.mg.drivePauseStart){GS.mg.drivePauseMs+=now-GS.mg.drivePauseStart;GS.mg.drivePauseStart=0;}
    const elapsed=now-GS.mg.driveStartT-GS.mg.drivePauseMs;
    const pct=Math.min(1,elapsed/GS.mg.driveDuration);
    GS.driveSpeed=Math.min(1,elapsed/1600); // visual ramp-up over 1.6s
    GS.driveProgress=pct;
    GS.mg.roadOffset=(GS.mg.roadOffset||0)+GS.driveSpeed*8;
    GS.miles+=GS.driveSpeed*.04;
    GS.fuel=Math.max(0,GS.fuel-.008*GS.driveSpeed);
    if(GS.mg.eventIdx<GS.mg.eventPoints.length&&pct>=GS.mg.eventPoints[GS.mg.eventIdx]){const slot=GS.mg.eventIdx;GS.mg.eventIdx++;triggerRandomDriveEvent(slot===0);}
    if(pct>=1){arrive();return;}
    if(GS.frameCount%30===0) beep(80+Math.random()*10,.05,'sawtooth',.04);
  }

  drawRoad(GS.mg.roadOffset);

  // Truck centered, cab on right (faces right = going forward correctly)
  const bob=Math.sin(GS.t*.2)*2;
  drawTruck(W/2-82,340+bob,.9);

  // Dust from back of trailer (left side)
  if(GS.frameCount%3===0&&!GS.awaitingChoice){
    if(!GS.mg.dust) GS.mg.dust=[];
    GS.mg.dust.push({x:W/2-70,y:380,vx:-2-Math.random()*2,vy:-1+Math.random()*2,life:20,r:3+Math.random()*4});
  }
  if(GS.mg.dust){
    GS.mg.dust=GS.mg.dust.filter(d=>d.life>0);
    GS.mg.dust.forEach(d=>{ctx.fillStyle=`rgba(150,120,80,${d.life/20})`;ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);ctx.fill();d.x+=d.vx;d.y+=d.vy;d.life--;});
  }

  // Progress bar
  const prog=GS.driveProgress/GS.driveTarget;
  rect(40,H-28,W-80,11,'#222'); rect(40,H-28,(W-80)*prog,11,'#00ff88');
  const from=GS.destinations[GS.currentDest], to=GS.destinations[GS.currentDest+1];
  txt(from?from.name:'',42,H-30,'#888',9);
  txt(to?to.name:'',W-42,H-30,'#ffd700',9,'right');

  txt(`${Math.floor(GS.driveSpeed*55+25)} MPH`,W-8,30,'#0ff',11,'right');
  if(GS.fuel<20&&Math.floor(GS.t*.1)%2) txt('⚠ LOW FUEL!',W/2,64,'#f00',15,'center');

  // Dim canvas behind dialog panel in portrait so text is readable
  if(GS.awaitingChoice&&isPortrait()) rect(0,300,W,H,'rgba(0,0,0,0.72)');

  updateHUD();
}

function arrive(){
  // Guard: prevent double-call when driveProgress stays >= driveTarget after awaitingChoice clears
  GS.driveProgress=0; GS.driveTarget=99999;
  GS.currentDest++;
  GS.day=Math.ceil(GS.day+1);

  // Livermore: show visit message, then trigger LLNL
  if(GS.currentDest===3){
    GS.screen='map';
    showHUD(); updateHUD();
    showMsg(`Steven pulls off I-580 into Livermore. His old buddy August works out here at the National Ignition Facility — a real physicist with a big beard and a Patagonia hat. Might as well swing by and say hi.`,true,()=>{
      GS.screen='minigame'; GS.minigame='llnl';
    });
    return;
  }

  // Albuquerque: chapter 2
  if(GS.currentDest===8){
    GS.money+=300; GS.chips=0;
    GS.screen='map'; // stop drive rendering while message shows
    successJingle();
    showMsg(`CHIPS DELIVERED to Albuquerque! Final delivery bonus: +$300. The client weeps with gratitude. Your potato chip trucking career is COMPLETE.`,true,()=>{
      showChapterBanner(2,'THE LONG ROAD HOME',"Steven points the rig north. Back to Bothell.",()=>{
        startDrive(); // currentDest is 8, drives to dest 9 (return Bothell)
      });
    });
    return;
  }

  // Return to Bothell (chapter 2 end → chapter 3)
  if(GS.currentDest===9){
    GS.screen='map'; // stop drive rendering while banner shows
    showChapterBanner(3,'TRASH MAN EXTRAORDINAIRE',"Steven becomes Seattle's greatest garbage collector.",()=>{
      GS.screen='minigame'; GS.minigame='trash';
    });
    return;
  }

  // Normal arrival
  GS.screen='map';
  GS.money+=150; GS.fuel=Math.min(100,GS.fuel+30);
  successJingle();
  const ARRIVAL_FLAVOR={
    1:"Steven rolls into Portland just as the rain starts. The city smells like coffee and pine. A barista in a flannel jacket flags him down for chips — apparently Portland runs on caffeine AND potato chips. +$150 delivery bonus. Refueled.",
    2:"Sacramento at last. The Central Valley heat hits like a hair dryer. The dispatch office is a converted taco stand with a hand-painted POTATO CHIP DEPOT sign. The client counts every single bag. Twice. +$150 bonus. Refueled.",
    4:"The City of Angels. Steven expected glitz — instead, he's stuck in gridlock on the 405 for three hours next to a guy filming a music video from a convertible. The delivery goes smooth though. +$150 bonus. Refueled.",
    5:"Las Vegas! The casinos blink at Steven from every direction. He resists the urge to put $20 on 'lucky chips' at the Bellagio. The casino catering team receives the delivery with suspicious enthusiasm. +$150 bonus. Refueled.",
    6:"Salt Lake City. Quiet, clean, unsettling. The customer is a man named Brother Kevin who needs 500 bags of chips for what he describes only as 'the gathering.' Steven doesn't ask questions. +$150 bonus. Refueled.",
    7:"Denver! Mile High City. Steven's ears pop on the way in. The air tastes thin and optimistic. The Rocky Mountains loom enormous to the west — snow-capped and indifferent. Steven eats a celebratory bag of chips. +$150 bonus. Refueled.",
  };
  const flavor=ARRIVAL_FLAVOR[GS.currentDest]||`Arrived at ${GS.destinations[GS.currentDest].name}! +$150 delivery bonus. Refueled. Day ${GS.day}.`;
  showMsg(flavor,true);
}

function initFrogger(){
  GS.mg={
    sx:W/2, sy:H-80, phase:'play',
    chasers:[], obstacles:[], spawnTimer:0, score:0, lives:3,
    truck:{x:W-140,y:H-80},
  };
  for(let i=0;i<3;i++) GS.mg.chasers.push({x:Math.random()*W,y:50+Math.random()*200});
  for(let i=0;i<4;i++) GS.mg.obstacles.push({x:80+i*160,y:200+Math.random()*100,w:80,h:40});
}
function updateFrogger(){
  const mg=GS.mg; if(mg.phase!=='play') return;
  const spd=3;
  if(keys['ArrowLeft']||keys['KeyA']) mg.sx=Math.max(20,mg.sx-spd);
  if(keys['ArrowRight']||keys['KeyD']) mg.sx=Math.min(W-20,mg.sx+spd);
  if(keys['ArrowUp']||keys['KeyW']) mg.sy=Math.max(40,mg.sy-spd);
  if(keys['ArrowDown']||keys['KeyS']) mg.sy=Math.min(H-40,mg.sy+spd);
  mg.chasers.forEach(c=>{
    const dx=mg.sx-c.x, dy=mg.sy-c.y, dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>0){c.x+=dx/dist*1.8; c.y+=dy/dist*1.8;}
    if(dist<30&&mg.lives>0){mg.lives--;beep(200,.3,'square',.2);mg.sx=W/2;mg.sy=H-80;if(mg.lives<=0){mg.phase='lose';failJingle();}}
  });
  mg.spawnTimer++;
  if(mg.spawnTimer>180){mg.spawnTimer=0;mg.chasers.push({x:Math.random()>.5?0:W,y:Math.random()*H});}
  const tdx=mg.truck.x-mg.sx, tdy=mg.truck.y-mg.sy;
  if(Math.sqrt(tdx*tdx+tdy*tdy)<50){mg.phase='win';mg.score=mg.lives*100;successJingle();GS.reputation+=10;}
  mg.score+=.05;
}
function drawFrogger(){
  const mg=GS.mg;
  rect(0,0,W,H,'#2a2a2a');
  for(let i=0;i<8;i++){ctx.strokeStyle='#444';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(i*110,0);ctx.lineTo(i*110,H);ctx.stroke();}
  for(let i=0;i<5;i++){ctx.beginPath();ctx.moveTo(0,i*120);ctx.lineTo(W,i*120);ctx.stroke();}
  mg.obstacles.forEach(o=>{rect(o.x,o.y,o.w,o.h,'#1a4a8a');rect(o.x+5,o.y+5,o.w-10,12,'#aaddff');});
  drawTruck(mg.truck.x-90,mg.truck.y-22,.65);
  const pulse=Math.sin(GS.t*.1)*4;
  rect(mg.truck.x-12+pulse/2,mg.truck.y-12+pulse/2,24-pulse,24-pulse,'rgba(0,255,136,0.3)');
  txt('ESCAPE!',mg.truck.x,mg.truck.y-30,'#00ff88',9,'center');
  const lotCols=['#ff69b4','#ff1493','#ff00ff','#ff6347'];
  mg.chasers.forEach((c,i)=>{const col=lotCols[i%4];rect(c.x-6,c.y-20,12,20,col);rect(c.x-6,c.y-30,12,12,'#f0c8a0');});
  drawSteven(mg.sx,mg.sy,1.1,GS.t);
  rect(0,0,W,34,'rgba(0,0,0,0.8)');
  txt('LOT LIZARD ESCAPE!',W/2,22,'#ffd700',15,'center');
  txt(`❤️ ${'♥ '.repeat(mg.lives)}`,10,22,'#e94560',12);
  txt(`SCORE: ${Math.floor(mg.score)}`,W-10,22,'#00ff88',12,'right');
  txt('WASD/Arrows: move. Reach your truck!',W/2,H-6,'#aaa',9,'center');
  if(mg.phase==='win'){overlay();txt('YOU ESCAPED!',W/2,H/2-28,'#00ff88',28,'center');txt('+10 Reputation',W/2,H/2+10,'#ffd700',14,'center');txt('ENTER to continue',W/2,H/2+45,'#aaa',12,'center');if(kd['Enter']||kd['Space']){kd['Enter']=false;exitMinigame(true);}}
  if(mg.phase==='lose'){overlay();txt('CAUGHT!',W/2,H/2-28,'#e94560',28,'center');txt('Steven is mortified.',W/2,H/2+10,'#aaa',14,'center');txt('ENTER to continue',W/2,H/2+45,'#aaa',12,'center');if(kd['Enter']||kd['Space']){kd['Enter']=false;GS.reputation-=15;exitMinigame(false);}}
}

function initHunt(){
  GS.mg={phase:'play',turkeys:[],sight:{x:W/2,y:H/2},shots:4,hit:0,timer:720,spawnTimer:0,scored:0,particles:[]};
  spawnTurkey(); spawnTurkey();
}
function spawnTurkey(){
  const side=Math.random()>.5?1:-1;
  GS.mg.turkeys.push({x:side>0?-50:W+50,y:200+Math.random()*200,vx:side*(1+Math.random()*2),vy:(Math.random()-.5)*.5,frame:0,alive:true});
}
function updateHunt(){
  const mg=GS.mg; if(mg.phase!=='play') return;
  // Mouse aiming (primary) — always tracks the cursor
  mg.sight.x=Math.max(20,Math.min(W-20,mouse.x));
  mg.sight.y=Math.max(20,Math.min(H-60,mouse.y));
  // Keyboard fallback (WASD / arrows move sight if mouse isn't in play zone)
  const spd=7;
  if(keys['ArrowLeft']||keys['KeyA']) mg.sight.x=Math.max(20,mg.sight.x-spd);
  if(keys['ArrowRight']||keys['KeyD']) mg.sight.x=Math.min(W-20,mg.sight.x+spd);
  if(keys['ArrowUp']||keys['KeyW']) mg.sight.y=Math.max(20,mg.sight.y-spd);
  if(keys['ArrowDown']||keys['KeyS']) mg.sight.y=Math.min(H-60,mg.sight.y+spd);
  if(kd['Space']||kd['Enter']||kd['MouseLeft']){kd['Space']=false;kd['Enter']=false;kd['MouseLeft']=false;if(mg.shots>0){mg.shots--;beep(180,.15,'sawtooth',.2);beep(120,.2,'sawtooth',.15);mg.turkeys.forEach(t=>{if(!t.alive) return;const dx=t.x-mg.sight.x,dy=t.y-mg.sight.y;if(Math.sqrt(dx*dx+dy*dy)<40){t.alive=false;mg.hit++;mg.scored+=100;successJingle();for(let i=0;i<12;i++) mg.particles.push({x:t.x,y:t.y,vx:(Math.random()-.5)*5,vy:-Math.random()*5,life:30,col:'#ff4'});}});}}
  mg.turkeys.forEach(t=>{if(!t.alive) return;t.x+=t.vx;t.y+=t.vy;t.frame=(t.frame+.15)%4;if(Math.random()<.02) t.vy=(Math.random()-.5)*2;if(t.x<-100||t.x>W+100) t.vx*=-1;t.y=Math.max(150,Math.min(H-60,t.y));});
  mg.spawnTimer++;
  if(mg.spawnTimer>200&&mg.turkeys.filter(t=>t.alive).length<3){mg.spawnTimer=0;spawnTurkey();}
  mg.particles=mg.particles.filter(p=>p.life>0);
  mg.particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.2;p.life--;});
  mg.timer--;
  if(mg.timer<=0||mg.shots<=0){mg.phase=mg.hit>0?'win':'lose';if(mg.phase==='win') successJingle(); else failJingle();}
}
function drawHunt(){
  const mg=GS.mg;
  const sky=ctx.createLinearGradient(0,0,0,H);

  mg.particles.forEach(p=>{ctx.fillStyle=p.col;ctx.fillRect(p.x,p.y,4,4);});
  mg.turkeys.forEach(t=>{

    const bob=Math.sin(t.frame*Math.PI*2)*3;

  const {x,y}=mg.sight;
  ctx.strokeStyle='rgba(255,0,0,0.8)'; ctx.lineWidth=2;

  ctx.beginPath();ctx.moveTo(x+8,y);ctx.lineTo(x+20,y);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x,y-20);ctx.lineTo(x,y-8);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x,y+8);ctx.lineTo(x,y+20);ctx.stroke();
  ctx.strokeStyle='rgba(255,0,0,0.4)'; ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(x,y,20,0,Math.PI*2);ctx.stroke();
  rect(0,0,W,42,'rgba(0,0,0,0.82)');
  txt('TURKEY HUNT!',W/2,20,'#ffd700',14,'center');

  if(mg.phase==='lose'){overlay();txt('MISSED!',W/2,H/2-30,'#e94560',26,'center');txt('The turkeys mock Steven loudly.',W/2,H/2+8,'#aaa',14,'center');txt('ENTER to continue',W/2,H/2+48,'#aaa',12,'center');if(kd['Enter']||kd['Space']){kd['Enter']=false;exitMinigame(false);}}

function initNinja(){
  GS.mg={phase:'play',sx:120,sy:H-80,ninjas:[],score:0,health:100,spawnTimer:0,timer:1200,invincible:0,combo:0,particles:[]};
  for(let i=0;i<3;i++) spawnNinja();
}
function spawnNinja(){
  GS.mg.ninjas.push({x:Math.random()>.5?W+50:-50,y:200+Math.random()*200,hp:3,attackTimer:0,frame:0,dead:false});
}
function updateNinja(){
  const mg=GS.mg; if(mg.phase!=='play') return;
  const spd=4;
  if(keys['ArrowLeft']||keys['KeyA']) mg.sx=Math.max(20,mg.sx-spd);
  if(keys['ArrowRight']||keys['KeyD']) mg.sx=Math.min(W-20,mg.sx+spd);
  if(keys['ArrowUp']||keys['KeyW']) mg.sy=Math.max(120,mg.sy-spd);
  if(keys['ArrowDown']||keys['KeyS']) mg.sy=Math.min(H-40,mg.sy+spd);
  if((kd['Space']||kd['Enter'])&&!GS.awaitingChoice){
    kd['Space']=false;kd['Enter']=false;
    beep(660,.05,'square',.2); beep(440,.1,'square',.15);
    let hit=false;
    mg.ninjas.forEach(n=>{if(n.dead) return;const dx=n.x-mg.sx,dy=n.y-mg.sy;if(Math.sqrt(dx*dx+dy*dy)<60){n.hp--;for(let i=0;i<8;i++) mg.particles.push({x:n.x,y:n.y,vx:(Math.random()-.5)*6,vy:-Math.random()*5,life:20,col:'#f00'});if(n.hp<=0){n.dead=true;mg.score+=100;mg.combo++;successJingle();}hit=true;}});
    if(!hit) mg.combo=0;
  }
  mg.ninjas.forEach(n=>{if(n.dead) return;const dx=mg.sx-n.x,dy=mg.sy-n.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist>80){n.x+=dx/dist*2.5;n.y+=dy/dist*2.5;}n.frame=(n.frame+.1)%4;n.attackTimer++;if(n.attackTimer>90&&dist<80&&mg.invincible<=0){n.attackTimer=0;mg.health-=15;mg.invincible=30;beep(200,.2,'sawtooth',.2);if(mg.health<=0){mg.phase='lose';failJingle();}}});
  if(mg.invincible>0) mg.invincible--;
  mg.spawnTimer++;
  if(mg.spawnTimer>350&&mg.ninjas.filter(n=>!n.dead).length<5){mg.spawnTimer=0;spawnNinja();}
  mg.particles=mg.particles.filter(p=>p.life>0);
  mg.particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.3;p.life--;});
  mg.timer--;
  if(mg.timer<=0){mg.phase='win';successJingle();GS.flags.ninjasDefeated=true;}
}
function drawNinja_mg(){
  const mg=GS.mg;
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#0a0a20');sky.addColorStop(.6,'#1a2a4a');sky.addColorStop(1,'#2a3a2a');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
  drawStars(30); drawMountains(255);
  rect(0,360,W,H-360,'#333');
  rect(0,356,W,7,'#555');
  for(let i=0;i<10;i++){const rx=((i*120+GS.t*2)%900+900)%900;rect(rx,398,60,6,'#ffd700');}
  for(let i=0;i<3;i++){rect(180+i*160,348,30,20,'#ffd700');txt('CHIPS',195+i*160,362,'#e63946',8,'center');}
  mg.particles.forEach(p=>{ctx.fillStyle=p.col;ctx.fillRect(p.x,p.y,4,4);});
  mg.ninjas.forEach(n=>{
    if(n.dead) return;
    const bob=Math.sin(n.frame*Math.PI*2)*3;
    rect(n.x-10,n.y-12+bob,20,18,'#111');
    rect(n.x-8,n.y-22+bob,16,12,'#1a1a1a');
    rect(n.x-4,n.y-18+bob,4,4,'#e00'); rect(n.x+2,n.y-18+bob,4,4,'#e00');
    ctx.strokeStyle='#aaa';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(n.x+10,n.y-8+bob);ctx.lineTo(n.x+28,n.y-24+bob);ctx.stroke();
    rect(n.x-6,n.y+6+bob,6,12,'#111'); rect(n.x+2,n.y+6+bob,6,12,'#111');
    for(let i=0;i<n.hp;i++) rect(n.x-8+i*7,n.y-30+bob,5,3,'#e94560');
  });
  if(mg.invincible<=0||Math.floor(GS.t*.2)%2) drawSteven(mg.sx,mg.sy,1.2,GS.t);
  rect(0,0,W,34,'rgba(0,0,0,0.8)');
  txt('NINJA CHIP HEIST!',W/2,22,'#ffd700',15,'center');
  txt(`HP: ${mg.health}%`,10,22,'#e94560',12);
  txt(`SCORE: ${mg.score}`,W-10,22,'#00ff88',12,'right');
  txt(`TIME: ${Math.ceil(mg.timer/60)}s`,300,22,'#0ff',12);
  if(mg.combo>1) txt(`${mg.combo}x COMBO!`,W/2,60,'#ffd700',17,'center');
  rect(0,34,W*(mg.health/100),5,'#e94560');
  txt('WASD: move  |  SPACE: punch',W/2,H-6,'#aaa',9,'center');
  if(mg.phase==='win'){overlay();txt('NINJAS DEFEATED!',W/2,H/2-35,'#ffd700',26,'center');txt('The potato chips are SAFE!',W/2,H/2+5,'#fff',14,'center');txt('ENTER to continue',W/2,H/2+48,'#aaa',12,'center');if(kd['Enter']||kd['Space']){kd['Enter']=false;exitMinigame(true);}}
  if(mg.phase==='lose'){overlay();txt('CHIPS STOLEN!',W/2,H/2-30,'#e94560',24,'center');txt('A dark day for potato lovers.',W/2,H/2+8,'#aaa',14,'center');txt('ENTER to continue',W/2,H/2+48,'#aaa',12,'center');if(kd['Enter']||kd['Space']){kd['Enter']=false;GS.chips=Math.max(0,GS.chips-100);exitMinigame(false);}}
}

function initCHP(){
  const laneY=[230,320,410];
  GS.mg={
    phase:'play', lane:1, chpLane:2,
    chpX:680, stevenX:160,
    bribeMoney:0, obstacles:[], moneyBags:[],
    timer:2700, chpSlow:0, chpSpeed:1.8, spawnTimer:0,
    laneY, score:0,
  };
  for(let i=0;i<4;i++) GS.mg.obstacles.push({x:350+i*140,lane:Math.floor(Math.random()*3),type:'cone'});
  for(let i=0;i<5;i++) GS.mg.moneyBags.push({x:300+i*110,lane:Math.floor(Math.random()*3),collected:false});
}
function updateCHP(){
  const mg=GS.mg; if(mg.phase!=='play') return;
  if(kd['ArrowUp']||kd['KeyW']){if(mg.lane>0){mg.lane--;beep(660,.05,'square',.1);}kd['ArrowUp']=false;kd['KeyW']=false;}
  if(kd['ArrowDown']||kd['KeyS']){if(mg.lane<2){mg.lane++;beep(440,.05,'square',.1);}kd['ArrowDown']=false;kd['KeyS']=false;}
  if(kd['Space']){kd['Space']=false;if(GS.chips>=20){GS.chips-=20;mg.chpSlow=200;mg.obstacles.push({x:mg.stevenX+80,lane:mg.lane,type:'chips',life:250});beep(880,.1,'square',.15);beep(440,.2,'square',.1);}}
  // scroll everything left
  const scroll=3.5;
  mg.obstacles.forEach(o=>{o.x-=scroll;if(o.life!==undefined) o.life--;});
  mg.moneyBags.forEach(b=>b.x-=scroll);
  mg.obstacles=mg.obstacles.filter(o=>o.x>-60&&(o.life===undefined||o.life>0));
  // collect money
  mg.moneyBags.forEach(b=>{if(!b.collected&&b.lane===mg.lane&&Math.abs(b.x-mg.stevenX)<28){b.collected=true;mg.bribeMoney+=100;mg.score+=100;beep(660,.1,'square',.12);}});
  // Steven hits obstacle
  const hitObs=mg.obstacles.some(o=>o.type!=='chips'&&o.lane===mg.lane&&Math.abs(o.x-mg.stevenX)<22);
  if(hitObs){GS.health=Math.max(0,GS.health-.3);mg.chpX-=.8;}
  // CHP movement
  if(mg.chpSlow>0){mg.chpSlow--;} else {
    mg.spawnTimer++;
    if(mg.spawnTimer>80){mg.spawnTimer=0;if(mg.chpLane<mg.lane) mg.chpLane++; else if(mg.chpLane>mg.lane) mg.chpLane--;}
    const blocked=mg.obstacles.some(o=>o.lane===mg.chpLane&&o.x>mg.stevenX&&o.x<mg.chpX);
    mg.chpX-=blocked?.4:mg.chpSpeed;
    mg.chpSpeed=Math.min(3.5,1.8+(2700-mg.timer)/800);
  }
  // spawn more
  if(Math.random()<.018) mg.obstacles.push({x:W+60,lane:Math.floor(Math.random()*3),type:'cone'});
  if(Math.random()<.009&&mg.moneyBags.filter(b=>!b.collected).length<7) mg.moneyBags.push({x:W+60,lane:Math.floor(Math.random()*3),collected:false});
  mg.timer--;
  if(mg.bribeMoney>=800||mg.timer<=0){mg.phase='win';successJingle();}
  if(mg.chpX<=mg.stevenX+18){mg.phase='lose';failJingle();}
}
function drawCHP_mg(){
  const mg=GS.mg;
  // California highway background
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#0a0a2e');sky.addColorStop(.35,'#1a3a6e');sky.addColorStop(.5,'#e87c3e');sky.addColorStop(.65,'#c8501a');sky.addColorStop(1,'#222');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#c8a820';
  for(let i=0;i<5;i++){ctx.beginPath();ctx.arc(i*200+80,175,120,0,Math.PI);ctx.fill();}
  for(let i=0;i<4;i++) drawPalm(i*210+90,240);
  rect(0,210,W,H-210,'#3a3a2a');
  // 3 lane roads
  const lY=mg.laneY;
  lY.forEach(ly=>{
    rect(0,ly-32,W,64,'#2e2e2e');
    rect(0,ly+30,W,4,'#555');
    rect(0,ly-34,W,4,'#555');
    for(let d=0;d<8;d++){const dx=((d*120-GS.t*4)%900+900)%900;rect(dx,ly-4,70,8,'#ffd700');}
  });
  // Money bags
  mg.moneyBags.forEach(b=>{if(b.collected) return;const by=lY[b.lane];rect(b.x-8,by-14,16,20,'#1a6a1a');txt('$',b.x-4,by+4,'#ffd700',12);});
  // Obstacles
  mg.obstacles.forEach(o=>{
    if(o.x<-25||o.x>W+25) return;
    const oy=lY[o.lane];
    if(o.type==='chips'){ctx.fillStyle='#c8a820';ctx.beginPath();ctx.ellipse(o.x,oy,24,10,0,0,Math.PI*2);ctx.fill();txt('🥔',o.x-8,oy+5,'#fff',12);}
    else{rect(o.x-12,oy-14,24,28,'#ff6600');txt('⚠',o.x-6,oy+6,'#fff',14);}
  });
  // CHP car
  const cy=lY[mg.chpLane];
  const flash=Math.floor(GS.t*.15)%2;
  rect(mg.chpX-24,cy-20,48,40,'#1a44cc');
  rect(mg.chpX-18,cy-14,36,18,'#aaddff');
  rect(mg.chpX-10,cy-24,8,6,flash?'#f00':'#800');
  rect(mg.chpX+4,cy-24,8,6,flash?'#00f':'#008');
  txt('CHP',mg.chpX-10,cy+8,'#fff',9);
  if(mg.chpSlow>0){txt('NOM NOM',mg.chpX-18,cy-30,'#ffd700',9);txt('CHIPS!',mg.chpX-12,cy-42,'#ffd700',9);}
  // Steven's truck (left side)
  drawTruck(mg.stevenX-100,lY[mg.lane]-24,.65);
  // Gap meter
  const gapPct=Math.max(0,(mg.chpX-mg.stevenX-18)/(W-mg.stevenX-18));
  rect(W/2-160,8,320,14,'#111');
  rect(W/2-160,8,320*gapPct,14,gapPct>.5?'#00ff88':gapPct>.25?'#ffd700':'#e94560');
  txt('◄ GAP ►',W/2,7,'#888',8,'center');
  // HUD
  rect(0,0,W,34,'rgba(0,0,0,0.82)');
  txt('CHP CHASE!',W/2,22,'#e94560',15,'center');
  txt(`BRIBE: $${mg.bribeMoney}/$800`,10,22,'#00ff88',10);
  txt(`TIME: ${Math.ceil(mg.timer/60)}s`,W-10,22,'#0ff',10,'right');
  txt('W/S: switch lane  |  SPACE: throw chips (-20 lbs)',W/2,H-6,'#aaa',9,'center');
  if(mg.phase==='win'){overlay();if(mg.bribeMoney>=800){txt('BRIBED!',W/2,H/2-38,'#ffd700',28,'center');txt('"Officer, please accept these chips."',W/2,H/2+2,'#00ff88',13,'center');txt('Officer accepts. No ticket. No questions.',W/2,H/2+24,'#aaa',12,'center');}else{txt('ESCAPED!',W/2,H/2-38,'#00ff88',28,'center');txt('You lost them in the desert dust!',W/2,H/2+2,'#fff',13,'center');}txt('ENTER to continue',W/2,H/2+65,'#aaa',12,'center');if(kd['Enter']||kd['Space']){kd['Enter']=false;GS.money+=Math.floor(mg.bribeMoney/4);exitMinigame(true);}}
  if(mg.phase==='lose'){overlay();txt('PULLED OVER!',W/2,H/2-38,'#e94560',26,'center');txt('CHP: "Sir, do you know how fast you were going?"',W/2,H/2+2,'#fff',11,'center');txt('Steven: "Fast enough to deliver America\'s chips!"',W/2,H/2+22,'#ffd700',11,'center');txt('$200 fine',W/2,H/2+50,'#e94560',14,'center');txt('ENTER to continue',W/2,H/2+78,'#aaa',12,'center');if(kd['Enter']||kd['Space']){kd['Enter']=false;GS.money=Math.max(0,GS.money-200);exitMinigame(false);}}
}

// MINI-GAME: NEW MEXICO — ALIEN FIGHT
// ============================================================
function initAlien(){
  GS.mg={phase:'play',sx:W/2,sy:390,aliens:[],lasers:[],score:0,health:100,timer:1800,invincible:0,spawnTimer:0,particles:[],punchFlash:0};
  for(let i=0;i<3;i++) spawnAlien();
}
function spawnAlien(){
  GS.mg.aliens.push({x:100+Math.random()*(W-200),y:-50,vy:.8+Math.random()*.6,hp:3,shootTimer:80+Math.random()*80,frame:0,dead:false});
}
function updateAlien(){
  const mg=GS.mg; if(mg.phase!=='play') return;
  const spd=4;
  if(keys['ArrowLeft']||keys['KeyA']) mg.sx=Math.max(30,mg.sx-spd);
  if(keys['ArrowRight']||keys['KeyD']) mg.sx=Math.min(W-30,mg.sx+spd);
  if(keys['ArrowUp']||keys['KeyW']) mg.sy=Math.max(200,mg.sy-spd);
  if(keys['ArrowDown']||keys['KeyS']) mg.sy=Math.min(H-40,mg.sy+spd);
  if((kd['Space']||kd['Enter'])&&!GS.awaitingChoice){
    kd['Space']=false;kd['Enter']=false; mg.punchFlash=10;
    beep(600,.08,'square',.18);
    mg.aliens.forEach(a=>{if(a.dead) return;const dx=a.x-mg.sx,dy=a.y-mg.sy;if(Math.sqrt(dx*dx+dy*dy)<72){a.hp--;for(let i=0;i<6;i++) mg.particles.push({x:a.x,y:a.y,vx:(Math.random()-.5)*5,vy:-Math.random()*4,life:22,col:'#0f0'});if(a.hp<=0){a.dead=true;mg.score+=150;successJingle();}}});
  }
  if(mg.punchFlash>0) mg.punchFlash--;
  mg.aliens.forEach(a=>{
    if(a.dead) return;
    a.y+=a.vy; a.frame=(a.frame+.08)%4;
    a.x+=Math.sin(GS.t*.05+a.y*.02)*1.5;
    a.shootTimer--;
    if(a.shootTimer<=0&&a.y>0&&a.y<H-60){
      a.shootTimer=70+Math.random()*80;
      const dx=mg.sx-a.x,dy=mg.sy-a.y,dist=Math.sqrt(dx*dx+dy*dy);
      mg.lasers.push({x:a.x,y:a.y,vx:dx/dist*5,vy:dy/dist*5,life:90});
      beep(220,.08,'sawtooth',.1);
    }
    if(a.y>H+50) a.dead=true;
  });
  mg.lasers.forEach(l=>{l.x+=l.vx;l.y+=l.vy;l.life--;});
  mg.lasers=mg.lasers.filter(l=>l.life>0);
  if(mg.invincible<=0){
    mg.lasers.forEach(l=>{if(Math.sqrt((l.x-mg.sx)**2+(l.y-mg.sy)**2)<24){mg.health-=20;mg.invincible=45;l.life=0;beep(150,.2,'sawtooth',.2);if(mg.health<=0){mg.phase='lose';failJingle();}}});
  }
  if(mg.invincible>0) mg.invincible--;
  mg.aliens=mg.aliens.filter(a=>!a.dead);
  mg.spawnTimer++;
  if(mg.spawnTimer>210&&mg.aliens.length<5){mg.spawnTimer=0;spawnAlien();}

function spawnTrashItem(){
  // Only spawn within telekinesis reach: pull point is (truckX, H-105=415), range 220

  GS.mg.trashItems.push({x:80+Math.random()*(W-160),y:220+Math.random()*130,type:Math.floor(Math.random()*4),collected:false});

function initTrash(){
  GS.mg={phase:'play',truckX:W/2-55,collected:0,score:0,timer:1800,powerMeter:100,orbitAngle:0,trashItems:[],particles:[],spawnTimer:0};
  for(let i=0;i<10;i++) spawnTrashItem();
}
function updateTrash(){
  const mg=GS.mg; if(mg.phase!=='play') return;
  if(keys['ArrowLeft']||keys['KeyA']) mg.truckX=Math.max(70,mg.truckX-3);
  if(keys['ArrowRight']||keys['KeyD']) mg.truckX=Math.min(W-100,mg.truckX+3);
  mg.orbitAngle+=.06;
  const teleOn=keys['Space']||keys['KeyW']||keys['ArrowUp'];
  if(teleOn){
    mg.powerMeter=Math.max(0,mg.powerMeter-1);
    mg.trashItems.forEach(t=>{
      if(t.collected) return;
      const dx=mg.truckX-t.x, dy=(H-105)-t.y, dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<240&&dist>0){t.x+=dx/dist*5;t.y+=dy/dist*5;}
    });
  } else mg.powerMeter=Math.min(100,mg.powerMeter+.3);
  mg.trashItems.forEach(t=>{
    if(t.collected) return;
    const dx=mg.truckX-t.x, dy=(H-105)-t.y;
    if(Math.sqrt(dx*dx+dy*dy)<50){t.collected=true;mg.collected++;mg.score+=50;for(let i=0;i<6;i++) mg.particles.push({x:t.x,y:t.y,vx:(Math.random()-.5)*5,vy:-Math.random()*4,life:25,col:'#0f0'});beep(660,.08,'square',.1);}
  });
  // Spawn 3 new items every 2 seconds, as long as fewer than 7 active
  mg.spawnTimer++;
  if(mg.spawnTimer>120){
    mg.spawnTimer=0;
    const active=mg.trashItems.filter(t=>!t.collected).length;
    if(active<7){
      for(let i=0;i<3;i++) spawnTrashItem();
      beep(330,.06,'square',.05);
    }
  }
  mg.particles=mg.particles.filter(p=>p.life>0);
  mg.particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.2;p.life--;});
  // Win early if player is crushing it
  if(mg.collected>=12){mg.phase='win';successJingle();GS.flags.becameGarbageMan=true;return;}
  mg.timer--;
  if(mg.timer<=0){
    mg.phase=mg.collected>=6?'win':'lose';
    if(mg.phase==='win'){successJingle();GS.flags.becameGarbageMan=true;}else failJingle();
  }
}

function initFire(){
  GS.mg={
    phase:'play',

    water:100, timer:0,
    timeLimit:1800,

function spawnFire(){
  GS.mg.fires.push({
    x:80+Math.random()*(W-160),
    y:150+Math.random()*160,
    size:18+Math.random()*22,
    intensity:1, alive:true,
    flicker:Math.random()*Math.PI*2,
  });
}
function updateFire(){
  const mg=GS.mg; if(mg.phase!=='play') return;
  const spd=4;
  if(keys['ArrowLeft']||keys['KeyA']) mg.sx=Math.max(30,mg.sx-spd);
  if(keys['ArrowRight']||keys['KeyD']) mg.sx=Math.min(W-30,mg.sx+spd);
  if(keys['ArrowUp']||keys['KeyW']) mg.sy=Math.max(100,mg.sy-spd);
  if(keys['ArrowDown']||keys['KeyS']) mg.sy=Math.min(H-50,mg.sy+spd);
  // douse fire with space/tap when close
  if((kd['Space']||kd['MouseLeft'])&&mg.water>0){
    kd['Space']=false; kd['MouseLeft']=false;
    mg.water=Math.max(0,mg.water-18);
    beep(280,.12,'sine',.15);
    mg.fires.forEach(f=>{
      if(!f.alive) return;
      const dx=mg.sx-f.x, dy=mg.sy-f.y;
      if(Math.sqrt(dx*dx+dy*dy)<f.size+30){
        f.intensity-=0.45;
        if(f.intensity<=0){
          f.alive=false; mg.doused++;
          for(let i=0;i<8;i++) mg.particles.push({x:f.x,y:f.y,vx:(Math.random()-.5)*4,vy:-Math.random()*4-1,life:28,col:'#88ccff'});
          successJingle();
        }
      }
    });
  }
  // water refills slowly
  mg.water=Math.min(100,mg.water+0.15);
  // fires grow if not doused
  mg.timer++;
  mg.fires.forEach(f=>{ if(f.alive){ f.flicker+=0.18; f.intensity=Math.min(2,f.intensity+0.0008*mg.timer*.01); }});
  mg.spawnTimer++;
  if(mg.spawnTimer>340&&mg.fires.filter(f=>f.alive).length<6){mg.spawnTimer=0;spawnFire();}
  mg.particles=mg.particles.filter(p=>p.life>0);
  mg.particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.15;p.life--;});
  if(mg.doused>=mg.needed){mg.phase='win';successJingle();}
  else if(mg.timer>mg.timeLimit){mg.phase='lose';failJingle();}
}

// MINI-GAME: SNOWBOARD — Breckenridge Yeti Slalom
// ============================================================
function initSnowboard(){
  const now=performance.now();
  GS.mg={
    phase:'play',
    sx:W/2, vx:0,
    obstacles:[], particles:[],
    spawnTimer:0, scrollY:0,
    startT:now, endT:now+22000, // 22 real seconds
    speed:3,
  };
}
function updateSnowboard(){
  const mg=GS.mg; if(mg.phase!=='play') return;
  const now=performance.now();
  const steer=2.8;
  if(keys['ArrowLeft']||keys['KeyA']) mg.vx=Math.max(-steer,mg.vx-.35);
  else if(keys['ArrowRight']||keys['KeyD']) mg.vx=Math.min(steer,mg.vx+.35);
  else mg.vx*=0.88;
  mg.sx=Math.max(30,Math.min(W-30,mg.sx+mg.vx));
  const elapsed=now-mg.startT;
  mg.speed=Math.min(7,3+elapsed/4000);
  mg.scrollY+=mg.speed;
  mg.spawnTimer++;
  if(mg.spawnTimer>50){
    mg.spawnTimer=0;
    const isYeti=Math.random()<0.40;
    mg.obstacles.push({x:60+Math.random()*(W-120),y:-60,w:isYeti?30:16,h:isYeti?38:30,isYeti,vx:(Math.random()-.5)*1.4,alive:true});
  }
  mg.obstacles.forEach(o=>{
    o.y+=mg.speed; o.x+=o.vx;
    if(o.x<30||o.x>W-30) o.vx*=-1;
    if(!o.alive) return;
    const dx=mg.sx-o.x, dy=(H-100)-o.y;
    if(Math.abs(dx)<o.w+8&&Math.abs(dy)<o.h+8){
      o.alive=false;
      beep(150,.25,'square',.25);
      for(let i=0;i<8;i++) mg.particles.push({x:mg.sx,y:H-100,vx:(Math.random()-.5)*6,vy:-Math.random()*5-1,life:28,col:o.isYeti?'#ddeeff':'#a0d8f0'});
      // penalty: push back the end time
      mg.endT=Math.min(mg.endT+2500, now+28000);
    }
  });
  mg.obstacles=mg.obstacles.filter(o=>o.y<H+60);
  mg.particles=mg.particles.filter(p=>p.life>0);
  mg.particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.18;p.life--;});
  if(now>=mg.endT){mg.phase='win';successJingle();}
}
function drawSnowboard_mg(){
  const mg=GS.mg;
  // Sky
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#7ab4e8'); sky.addColorStop(.5,'#a8c8f0'); sky.addColorStop(1,'#dde8f8');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
  // Scrolling snow slope
  ctx.fillStyle='#e8f0f8'; ctx.fillRect(0,0,W,H);
  // Snow lines scrolling down
  ctx.strokeStyle='rgba(180,200,220,0.5)'; ctx.lineWidth=1;
  for(let i=0;i<6;i++){const ly=((mg.scrollY*.4+i*90)%H);ctx.beginPath();ctx.moveTo(0,ly);ctx.lineTo(W,ly+12);ctx.stroke();}
  // Trees on sides
  for(let i=0;i<4;i++){
    const ty=((mg.scrollY*.8+i*120)%H);
    drawTree(20,ty,0.7); drawTree(W-20,ty,0.7);
  }
  // Obstacles
  mg.obstacles.forEach(o=>{
    if(!o.alive) return;
    if(o.isYeti){
      // Yeti
      rect(o.x-14,o.y-36,28,36,'#e8e8e8');
      rect(o.x-10,o.y-52,20,18,'#d0d0d0');
      rect(o.x-14,o.y-20,6,22,'#ccc'); rect(o.x+8,o.y-20,6,22,'#ccc');
      rect(o.x-6,o.y-48,6,6,'#333'); rect(o.x+2,o.y-48,6,6,'#333');
      ctx.fillStyle='#ff2020'; ctx.beginPath(); ctx.arc(o.x,o.y-38,4,0,Math.PI); ctx.fill();
      txt('YETI',o.x,o.y-58,'#4488cc',8,'center');
    } else {
      // Tree / rock
      drawTree(o.x,o.y,0.8);
    }
  });
  // Particles
  mg.particles.forEach(p=>{ctx.fillStyle=`rgba(255,255,255,${p.life/22})`;ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();});
  // Steven on snowboard
  const bobY=H-100+Math.sin(GS.t*.15)*2;
  drawSteven(mg.sx,bobY,1.1,GS.t*.5);
  // snowboard
  ctx.fillStyle='#e94560'; ctx.save(); ctx.translate(mg.sx,bobY+32);
  ctx.rotate(mg.vx*.08); ctx.fillRect(-22,-4,44,8); ctx.restore();
  // snow spray
  if(Math.abs(mg.vx)>0.5||mg.speed>3.5){
    ctx.fillStyle='rgba(220,235,255,0.5)';
    ctx.beginPath(); ctx.arc(mg.sx+(mg.vx<0?12:-12),bobY+28,8,0,Math.PI*2); ctx.fill();
  }
  // HUD
  rect(0,0,W,36,'rgba(0,0,0,0.7)');
  txt('BRECKENRIDGE SNOWBOARD RUN',W/2,23,'#88ccff',14,'center');
  const now2=performance.now();
  const elapsed2=now2-mg.startT;
  const totalDur=mg.endT-mg.startT;
  const pct=Math.min(1,elapsed2/totalDur);
  rect(20,6,W-40,10,'#224'); rect(20,6,(W-40)*pct,10,'#4af');
  const secLeft=Math.max(0,Math.ceil((mg.endT-now2)/1000));
  txt(`⏱ ${secLeft}s`,W-10,25,'#88ccff',13,'right');
  txt('ARROWS/DRAG: steer   avoid YETIS & trees!',W/2,H-8,'#aaa',9,'center');
  if(mg.phase==='win'){overlay();txtShadow('GNARLY!',W/2,H/2-30,'#00ff88','#004400',36,'center');txt('Steven shreds the mountain!',W/2,H/2+10,'#ffd700',14,'center');txt('+$150 +10 Rep +20 HP',W/2,H/2+32,'#00ff88',12,'center');if(Math.floor(GS.t*.07)%2)txt('TAP or ENTER to continue',W/2,H/2+58,'#fff',12,'center');if(kd['Enter']||kd['Space']||kd['MouseLeft']){kd['Enter']=false;kd['Space']=false;kd['MouseLeft']=false;GS.money+=150;GS.reputation+=10;GS.health=Math.min(100,GS.health+20);exitMinigame(true);}}
}

// ---- UTILITIES ----
function overlay(){rect(0,0,W,H,'rgba(0,0,0,0.78)');}

function exitMinigame(success){
  GS.screen='map'; GS.minigame=null; _lastMG=null;
  GS.awaitingChoice=false;
  showHUD(); updateHUD();
  if(success){GS.money+=100;GS.reputation+=5;showMsg('Mini-game complete! +$100 +5 Rep',true);}
  else{GS.reputation-=5;showMsg('Rough day... -5 Rep. Steven drives on.',false);}
}

// ---- GAME OVER / WIN ----
function drawGameOver(){
  rect(0,0,W,H,'#000'); drawStars(60);
  txtShadow('GAME OVER',W/2,185,'#e94560','#600',46);
  txt("Steven's adventure has ended.",W/2,258,'#aaa',13,'center');
  txt(`Miles driven: ${Math.floor(GS.miles)}`,W/2,295,'#ffd700',12,'center');
  txt(`Money: $${GS.money}`,W/2,318,'#ffd700',12,'center');
  txt(`Reputation: ${GS.reputation}`,W/2,341,'#ffd700',12,'center');
  txt('ENTER to play again',W/2,430,'#fff',13,'center');
  if(kd['Enter']||kd['Space']){kd['Enter']=false;resetGame();}
}

function drawTrashTruck(x,y,s=1){
  // Orange trash truck facing right
  // body
  rect(x,y-14*s,90*s,28*s,'#e87020');
  rect(x,y-18*s,90*s,5*s,'#c86010');
  // hopper back
  rect(x+90*s,y-18*s,18*s,32*s,'#b85010');
  // cab
  rect(x+108*s,y-20*s,42*s,36*s,'#e87020');
  rect(x+120*s,y-16*s,22*s,14*s,'#88ccff');
  // headlights
  rect(x+148*s,y-8*s,4*s,4*s,'#ffff88');
  rect(x+148*s,y+1*s,4*s,4*s,'#ff6600');
  // TRASH text
  ctx.font=`bold ${Math.max(6,Math.round(7*s))}px 'Courier New'`;
  ctx.fillStyle='#fff'; ctx.textAlign='center';
  ctx.fillText('TRASH CO.',x+45*s,y+4*s);
  // wheels
  [[x+8*s],[x+58*s],[x+106*s],[x+125*s]].forEach(([wx])=>{
    rect(wx,y+11*s,15*s,15*s,'#1a1a1a');
    rect(wx+3*s,y+14*s,9*s,9*s,'#444');
  });
  // exhaust stacks
  rect(x+110*s,y-34*s,4*s,16*s,'#666');
  rect(x+116*s,y-36*s,4*s,16*s,'#888');
  // smoke puff
  if(Math.floor(GS.t*.1)%3===0){
    ctx.fillStyle='rgba(160,160,160,0.4)';
    ctx.beginPath(); ctx.arc(x+113*s,y-36*s,6*s,0,Math.PI*2); ctx.fill();
  }
}

function drawWin(){
  // Animated sunset sky
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#0a0520');
  sky.addColorStop(.30,'#3a1040');
  sky.addColorStop(.52,'#c84020');
  sky.addColorStop(.65,'#f07020');
  sky.addColorStop(.78,'#f0c040');
  sky.addColorStop(1,'#c89820');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  // Sun
  const sunY=280+Math.sin(GS.t*.008)*4;
  const sunG=ctx.createRadialGradient(W/2,sunY,0,W/2,sunY,58);
  sunG.addColorStop(0,'#fff8c0'); sunG.addColorStop(.4,'#ffe060'); sunG.addColorStop(1,'rgba(255,160,0,0)');
  ctx.fillStyle=sunG; ctx.beginPath(); ctx.arc(W/2,sunY,58,0,Math.PI*2); ctx.fill();
  // sun rays
  ctx.strokeStyle='rgba(255,220,80,0.18)'; ctx.lineWidth=2;
  for(let i=0;i<12;i++){const a=i*Math.PI/6+GS.t*.002; ctx.beginPath(); ctx.moveTo(W/2+Math.cos(a)*62,sunY+Math.sin(a)*62); ctx.lineTo(W/2+Math.cos(a)*90,sunY+Math.sin(a)*90); ctx.stroke();}

  // Silhouette mountains
  ctx.fillStyle='#1a0c30';
  ctx.beginPath(); ctx.moveTo(0,H);
  [0,90,200,310,420,520,620,720,800].forEach((mx,i)=>{
    const mh=i%2===0?130+i*8:70+i*6;
    ctx.lineTo(mx,320-mh);
  });
  ctx.lineTo(800,H); ctx.closePath(); ctx.fill();

  // Ground strip — warm amber
  const grd=ctx.createLinearGradient(0,320,0,H);
  grd.addColorStop(0,'#7a4010'); grd.addColorStop(1,'#3a1a00');
  ctx.fillStyle=grd; ctx.fillRect(0,320,W,H-320);

  // Road
  rect(0,350,W,80,'#2a2a2a');
  rect(0,346,W,6,'#555');
  rect(0,428,W,6,'#555');
  for(let i=0;i<10;i++){const rx=((i*120-GS.t*2.5)%900+900)%900; rect(rx,383,65,8,'#ffd700');}

  // Animated clouds (silhouetted)
  [[100,105,70],[310,90,55],[560,112,62]].forEach(([cx,cy,cw])=>{
    const ox=((cx-GS.t*.4)%920+920)%920;
    ctx.fillStyle='rgba(60,10,80,0.55)';
    ctx.beginPath();ctx.arc(ox,cy,cw*.38,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(ox+cw*.28,cy-cw*.12,cw*.28,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(ox+cw*.56,cy+cw*.04,cw*.22,0,Math.PI*2);ctx.fill();
  });

  // Animated trash truck driving into sunset
  const truckX=((GS.t*1.8)%(W+200))-200;
  drawTrashTruck(truckX,358,.9);
  // Steven waving from cab window
  const stevenX=truckX+138;
  rect(stevenX-5,335,10,12,'#f0c8a0'); // head peeking out window
  // waving arm
  const armAngle=Math.sin(GS.t*.15)*0.7;
  ctx.save(); ctx.translate(stevenX,338);
  ctx.rotate(-armAngle);
  rect(-2,-14,5,14,'#f0c8a0');
  ctx.restore();

  // Title text
  ctx.shadowBlur=18; ctx.shadowColor='#ff8020';
  txtShadow('THE END',W/2,68,'#ffd700','#8B3000',42);
  ctx.shadowBlur=0;
  txt('Steven rides into the sunset.',W/2,118,'#f0c080',13,'center');
  txt('Chip trucker. Hero. Trash Man. Legend.',W/2,140,'#f0c080',11,'center');

  // Story paragraph
  const story=[
    'From Bothell to Albuquerque, through fire and snowstorms,',
    'ninjas, lot lizards, alien invasions, and one very aggressive',
    'turkey — Steven delivered every last bag of potato chips.',
    'Now, behind the wheel of his garbage truck, there is peace.',
    'The sunset is warm. The road is long. The chips were worth it.',
  ];
  story.forEach((line,i)=>txt(line,W/2,175+i*17,'#d0a060',10,'center'));

  // Trophies
  const trophies=[];
  if(GS.flags.gainedPowers)   trophies.push('★ Telekinesis Master');
  if(GS.flags.ninjasDefeated) trophies.push('★ Ninja Slayer');
  if(GS.flags.huntingDone)    trophies.push('★ Turkey Hunter');
  if(GS.flags.becameGarbageMan) trophies.push('★ Trash Man Legend');
  trophies.forEach((t,i)=>txt(t,W/2,368+i*16,'#ffd700',10,'center'));

  txt(`Final: $${GS.money} | Day ${GS.day} | ${Math.floor(GS.miles)} mi`,W/2,455,'#c09050',10,'center');
  if(Math.floor(GS.t*.06)%2) txt('ENTER to play again',W/2,478,'#fff',12,'center');
  if(kd['Enter']||kd['Space']){kd['Enter']=false;resetGame();}
}

function resetGame(){
  Object.assign(GS,{screen:'title',minigame:null,chapter:1,health:100,fuel:100,chips:500,money:250,reputation:50,miles:0,day:1,flags:{gainedPowers:false,lostClothes:false,ninjasDefeated:false,huntingDone:false,llnlVisited:false,becameGarbageMan:false},currentDest:0,t:0,frameCount:0,awaitingChoice:false,mg:{},eventsFired:new Set()});
  triviaPool=[]; _triviaQ=null; _lastMG=null;
  msgBox.style.display='none'; choicesDiv.innerHTML=''; hud.style.display='none'; chapterBanner.style.display='none';
}

// ---- MAIN LOOP ----
let _lastMG=null;

function gameLoop(){
  GS.t++; GS.frameCount++;

  if(GS.health<=0||GS.fuel<=0){
    if(GS.screen!=='gameover'&&GS.screen!=='win'){
      GS.screen='gameover'; failJingle();
      hud.style.display='none'; msgBox.style.display='none'; choicesDiv.innerHTML='';
    }
  }

  ctx.clearRect(0,0,W,H);

  switch(GS.screen){
    case 'title':    drawTitle();    break;
    case 'map':      drawMap();      break;
    case 'drive':    drawDrive();    break;
    case 'gameover': drawGameOver(); break;
    case 'win':      drawWin();      break;
    case 'minigame':
      // Init on the exact first frame — prevents crash from uninitialized mg state
      if(GS.minigame!==_lastMG){
        _lastMG=GS.minigame;
        hud.style.display='none'; msgBox.style.display='none'; choicesDiv.innerHTML='';
        switch(GS.minigame){
          case 'frogger':    initFrogger();    break;
          case 'hunt':       initHunt();       break;
          case 'llnl':       initLLNL();       break;
          case 'ninja':      initNinja();      break;
          case 'chp':        initCHP();        break;
          case 'mormon':     initMormon();     break;
          case 'alien':      initAlien();      break;
          case 'trash':      initTrash();      break;
          case 'fire':       initFire();       break;
          case 'snowboard':  initSnowboard();  break;
        }
      }
      switch(GS.minigame){
        case 'frogger':   updateFrogger();   drawFrogger();      break;
        case 'hunt':      updateHunt();      drawHunt();         break;
        case 'llnl':      updateLLNL();      drawLLNL();         break;
        case 'ninja':     updateNinja();     drawNinja_mg();     break;
        case 'chp':       updateCHP();       drawCHP_mg();       break;
        case 'mormon':    updateMormon();    drawMormon_mg();    break;
        case 'alien':     updateAlien();     drawAlien_mg();     break;
        case 'trash':     updateTrash();     drawTrash_mg();     break;
        case 'fire':      updateFire();      drawFire_mg();      break;
        case 'snowboard': updateSnowboard(); drawSnowboard_mg(); break;
      }
      break;
  }

  if(GS.screen!=='minigame') _lastMG=null;

  // Win trigger: trash man complete → win screen
  if(GS.screen==='map'&&GS.currentDest>=9&&GS.flags.becameGarbageMan){
    GS.screen='win';
  }

  // Virtual joystick overlay on all interactive screens
  if(GS.screen==='drive'||GS.screen==='minigame') drawVJ();

  Object.keys(kd).forEach(k=>kd[k]=false);
  requestAnimationFrame(gameLoop);
}

hideHUD();
gameLoop();
</script>
